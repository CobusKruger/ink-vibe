# CI pipeline (AD-8, architecture lines 554-559) — Story 1.11 scaffold.
#
# Stage order is load-bearing: analyse + arch-rules gate BEFORE tests, and the
# conflation rule (Ink\Entitlement ⟂ Ink\Tiers) is a build-FAILING Deptrac
# invariant, not a runtime check. Risk-based depth (NFR-9): the wp-env
# integration job runs in full for PRs/pushes to `main` and is skipped (smoke
# elsewhere) on other branches. PayFast uses the SANDBOX only — never the live
# ZAR gateway.
name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    name: Analyse + unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: PHPStan (static analysis)
        run: composer stan

      - name: PHPCS (WPCS coding standards)
        run: composer cs

      - name: Deptrac (AD-1 module graph + Entitlement ⟂ Tiers)
        run: composer deptrac

      - name: Afrikaans copy-placeholder scan (NFR-1 static subset — ratchet)
        run: composer copy:scan

      - name: Pest (unit suite — WP mocked)
        run: composer test:unit

  integration:
    name: wp-env integration
    runs-on: ubuntu-latest
    needs: quality
    # Risk-based depth (NFR-9): full integration only on main; smoke elsewhere.
    if: github.ref == 'refs/heads/main' || github.base_ref == 'main'
    env:
      # PayFast sandbox only in tests (project-context: never the live gateway).
      PAYFAST_MODE: sandbox
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Start wp-env (WordPress 7.0 / PHP 8.3)
        run: npx --yes @wordpress/env@11.8.0 start

      - name: Pest (integration suite — real WP via wp-env)
        run: composer test:integration

      # Live English-leak gate, Layer 2 (NFR-1, Story 17.4 carry-forward): crawl the
      # key front-end pages on the running wp-env site + scan rendered HTML. The
      # static Layer-1 ratchet (copy:scan) ran in `quality`; this is the runtime layer.
      - name: Live English-leak scan (NFR-1 Layer 2 — page crawl)
        run: php tools/leak-scan/scan-rendered.php http://localhost:8888

  e2e:
    name: Playwright E2E (critical journey — PayFast sandbox)
    runs-on: ubuntu-latest
    needs: quality
    # Risk-based depth (NFR-9): the E2E smoke journey runs on main (and PRs targeting
    # main). PayFast uses the SANDBOX only — never the live ZAR gateway.
    if: github.ref == 'refs/heads/main' || github.base_ref == 'main'
    env:
      PAYFAST_MODE: sandbox
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node dependencies
        run: npm install --no-audit --no-fund

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start wp-env (WordPress 7.0 / PHP 8.3)
        run: npx --yes @wordpress/env@11.8.0 start

      - name: Playwright E2E smoke (register → PayFast sandbox → submit → publish → read → renew)
        run: npm run test:e2e:smoke
        env:
          WP_BASE_URL: http://localhost:8888
