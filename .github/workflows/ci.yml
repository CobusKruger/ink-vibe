# CI pipeline (AD-8, architecture lines 554-559) — Story 1.11 scaffold.
#
# Stage order is load-bearing: analyse + arch-rules gate BEFORE tests, and the
# conflation rule (Ink\Entitlement ⟂ Ink\Tiers) is a build-FAILING Deptrac
# invariant, not a runtime check. Risk-based depth (NFR-9): the wp-env
# integration job runs in full for PRs/pushes to `main` and is skipped (smoke
# elsewhere) on other branches. PayFast uses the SANDBOX only — never the live
# ZAR gateway.
name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    name: Analyse + unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: PHPStan (static analysis)
        run: composer stan

      - name: PHPCS (WPCS coding standards)
        run: composer cs

      - name: Deptrac (AD-1 module graph + Entitlement ⟂ Tiers)
        run: composer deptrac

      - name: Pest (unit suite — WP mocked)
        run: composer test:unit

  integration:
    name: wp-env integration
    runs-on: ubuntu-latest
    needs: quality
    # Risk-based depth (NFR-9): full integration only on main; smoke elsewhere.
    if: github.ref == 'refs/heads/main' || github.base_ref == 'main'
    env:
      # PayFast sandbox only in tests (project-context: never the live gateway).
      PAYFAST_MODE: sandbox
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Start wp-env (WordPress 7.0 / PHP 8.3)
        run: npx --yes @wordpress/env@11.8.0 start

      - name: Pest (integration suite — real WP via wp-env)
        run: composer test:integration

  e2e:
    name: Playwright E2E (deferred to Story 18.8)
    runs-on: ubuntu-latest
    needs: quality
    # Placeholder only. The full E2E pyramid + critical journeys
    # (register → PayFast sandbox → submit → publish → react → renew) land in
    # Story 18.8 (NFR-9). Likewise the English-leak scan (NFR-1, tools/leak-scan)
    # becomes a standing CI + cron gate in Story 17.4 / Epic 18.
    if: false
    steps:
      - run: echo "Playwright E2E suite is built in Story 18.8."
