# Deptrac — AD-1 modular-monolith dependency graph for ink-core (Story 1.11).
#
# THE CONFLATION RULE (FR-13, architecture lines 654-659): `Ink\Entitlement` and
# `Ink\Tiers` must NOT reference each other. This is enforced structurally —
# neither layer lists the other in its allowed dependencies, and Deptrac fails
# the build on ANY dependency that is not explicitly allowed. Notifications is
# the only shared downstream event consumer (it may depend on the domains; the
# domains never depend on each other).
#
# Modules currently carry only Kernel-facing skeletons (1.7-1.10); each module
# is allowed to depend on Kernel (shared enums / value objects / schema / cache).
# Later stories EXTEND a module's allowlist as real cross-module Api-facade
# dependencies appear — but the Entitlement <-> Tiers prohibition is permanent.
deptrac:
    paths:
        - wp-content/plugins/ink-core/src
    layers:
        - name: Kernel
          collectors:
            - type: classNameRegex
              value: '#^Ink\\Kernel\\.*#'
        - name: Content
          collectors:
            - type: classNameRegex
              value: '#^Ink\\Content\\.*#'
        - name: Entitlement
          collectors:
            - type: classNameRegex
              value: '#^Ink\\Entitlement\\.*#'
        - name: Tiers
          collectors:
            - type: classNameRegex
              value: '#^Ink\\Tiers\\.*#'
        - name: Submission
          collectors:
            - type: classNameRegex
              value: '#^Ink\\Submission\\.*#'
        - name: Engagement
          collectors:
            - type: classNameRegex
              value: '#^Ink\\Engagement\\.*#'
        - name: Social
          collectors:
            - type: classNameRegex
              value: '#^Ink\\Social\\.*#'
        - name: Discovery
          collectors:
            - type: classNameRegex
              value: '#^Ink\\Discovery\\.*#'
        - name: Library
          collectors:
            - type: classNameRegex
              value: '#^Ink\\Library\\.*#'
        - name: Training
          collectors:
            - type: classNameRegex
              value: '#^Ink\\Training\\.*#'
        - name: Challenges
          collectors:
            - type: classNameRegex
              value: '#^Ink\\Challenges\\.*#'
        - name: Sponsors
          collectors:
            - type: classNameRegex
              value: '#^Ink\\Sponsors\\.*#'
        - name: Notifications
          collectors:
            - type: classNameRegex
              value: '#^Ink\\Notifications\\.*#'
        - name: Forms
          collectors:
            - type: classNameRegex
              value: '#^Ink\\Forms\\.*#'
    ruleset:
        # Kernel is the shared base — depends on no other module.
        Kernel: ~
        # Every domain module may use the Kernel; cross-module deps are added
        # by later stories as real Api-facade usage appears.
        Content:
            - Kernel
        Entitlement:
            - Kernel
            # Story 4.2: the PurchaseActivation seam consumes the Notifications Api
            # facade to register + fire the activation email (AD-9: "it emits the
            # lifecycle events Notifications consumes"). A real, non-circular
            # cross-module Api-facade dependency (Notifications depends only on
            # Kernel and never back on Entitlement) — the documented "extend a
            # module's allowlist as real Api-facade usage appears" path. The
            # PERMANENT Entitlement ⟂ Tiers prohibition is untouched.
            - Notifications
        Tiers:
            - Kernel
            # Story 5.10: the PromotionEmails consumer dispatches the auto-promotion
            # congratulation email through the Notifications Api facade (AD-9). A real,
            # non-circular cross-module Api-facade dependency (Notifications depends only
            # on Kernel, never back on Tiers) — the documented "extend a module's
            # allowlist as real Api-facade usage appears" path, mirroring the 4.2
            # Entitlement -> Notifications edge. The PERMANENT Entitlement <-> Tiers
            # prohibition is untouched.
            - Notifications
        Submission:
            - Kernel
            # Story 6.1: the Skryf form reads the bydrae CPT slugs from the
            # migration-load-bearing single source `Ink\Content\PostTypes`
            # (GEDIG/STORIE/ARTIKEL constants + bydraeTypes()). A real
            # cross-module dependency on the slug registry — the documented
            # "extend a module's allowlist as real usage appears" path.
            - Content
            # Story 6.8: the publish gate calls `Ink\Entitlement\Api::can_submit()`
            # + `::statusMessage()` (AD-2/FR-19) — THE conflation rule's enforcement
            # point. A real, non-circular cross-module Api-facade dependency
            # (Entitlement depends only on Kernel/Notifications, never back on
            # Submission). The PERMANENT Entitlement <-> Tiers prohibition is
            # untouched — Submission gates on lidmaatskap, NEVER on Ink\Tiers.
            - Entitlement
        Engagement:
            - Kernel
            # Story 7.6: suggested reads queries the bydrae CPT slugs from the
            # migration-load-bearing single source `Ink\Content\PostTypes`.
            - Content
        Social:
            - Kernel
            # Story 9.3: the following-feed lists published bydraes, so it reads the
            # reader-facing CPT slugs from the migration-load-bearing single source
            # `Ink\Content\PostTypes::readableTypes()` (GEDIG/STORIE/ARTIKEL). A real,
            # non-circular cross-module dependency on the slug registry — mirrors the
            # Discovery->Content (8.1), Submission->Content (6.1) and
            # Engagement->Content (7.6) edges. No Entitlement/Tiers edge (seeing your
            # feed is open; conflation-clean).
            - Content
            # Story 9.4: the public Skrywerprofiel block shows the writer's Gradering
            # badge — a DISPLAY read of `Ink\Tiers\Api::gradingView()`, never a gate
            # (THE conflation rule holds). Mirrors the accepted Discovery->Tiers
            # display edge (8.5). No Entitlement edge.
            - Tiers
        Discovery:
            - Kernel
            # Story 8.1: the Ontdek works archive queries the bydrae CPT slugs from
            # the migration-load-bearing single source `Ink\Content\PostTypes`
            # (GEDIG/STORIE/ARTIKEL). A real, non-circular cross-module dependency
            # on the slug registry — mirrors the Submission->Content (6.1) and
            # Engagement->Content (7.6) edges. No Entitlement/Tiers edge (discovery
            # of published work is open; conflation-clean).
            - Content
            # Story 8.2: the "Mees geliefd" sort + the trending recompute read the
            # DENORMALIZED reaction-total meta-key contract via the Engagement Api
            # facade (`Api::reactionTotalMetaKey()`). A real, non-circular cross-
            # module Api-facade dependency (Engagement depends only on Kernel/Content,
            # never back on Discovery).
            - Engagement
            # Story 8.3: the skrywers tab reads each writer's Gradering for DISPLAY
            # via `Ink\Tiers\Api::forUser()` (AD-7 "tier from user-meta"). A real,
            # non-circular cross-module Api-facade dependency — display only,
            # NEVER gates discovery on a tier, and carries zero Ink\Entitlement
            # (THE conflation rule is untouched: Discovery sorts/filters on form +
            # read/recency, never on tier).
            - Tiers
        Library:
            - Kernel
            # Story 10.1: the Biblioteek archive reads the migration-load-bearing
            # CPT + taxonomy single sources `Ink\Content\PostTypes::BIBLIOTEEK_ITEM`
            # + `Ink\Content\Taxonomies::GENRE`. A real, non-circular cross-module
            # dependency on the slug registry — mirrors the Discovery->Content (8.1),
            # Submission->Content (6.1) and Engagement->Content (7.6) edges. No
            # Entitlement/Tiers edge (browsing published library work is open;
            # conflation-clean).
            - Content
        Training:
            - Kernel
            # Story 11.1: the Opleiding hub reads the migration-load-bearing CPT
            # single source `Ink\Content\PostTypes::OPLEIDING_ARTIKEL` (and, from
            # Story 11.2, the `vaardigheid`/`genre` taxonomy slugs). A real,
            # non-circular cross-module dependency on the slug registry — mirrors
            # the Library->Content (10.1) and Discovery->Content (8.1) edges. No
            # Entitlement/Tiers edge (browsing published training is open;
            # conflation-clean). The shared pill/pagination/request-read primitives
            # live in `Ink\Kernel\ArchiveRender` (Kernel — already an allowed dep).
            - Content
        Challenges:
            - Kernel
        Sponsors:
            - Kernel
        Notifications:
            - Kernel
            # Story 9.9: the in-app kennisgewing sources fan out to the work
            # author's volgelinge (Social\Api::followerIdsFor), read the readable
            # CPT slugs (Content\PostTypes::readableTypes), and share the 4.8
            # lifecycle expiry anchor (Entitlement\LifecycleEmails::HOOK_SEND_WARNING
            # — hook-name constant only, the shared schedule, NOT a gate). No Tiers
            # edge; conflation-clean (notifications never gate on tier/entitlement).
            - Social
            - Content
            - Entitlement
        Forms:
            - Kernel
